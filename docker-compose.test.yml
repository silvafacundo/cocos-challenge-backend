services:
  db-test:
    image: postgres:17.4
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:admin@db-test:5432/db
    depends_on:
      db-test:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run seed && npm test"




