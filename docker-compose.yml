services:
  db:
    image: postgres:17.4
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "6432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/db
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run seed && npm run dev"

volumes:
  pg_data: